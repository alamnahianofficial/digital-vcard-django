<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: #0d0d1a;
      font-family: 'Poppins', sans-serif;
      color: #eee;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .box {
      background: #161625;
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 16px;
      padding: 35px 25px;
      width: 100%;
      max-width: 360px;
      text-align: center;
    }
    .lock { font-size: 36px; margin-bottom: 12px; }
    h2 { font-size: 20px; font-weight: 600; margin-bottom: 6px; }
    .sub { font-size: 13px; color: #666; margin-bottom: 24px; }
    input[type=password] {
      width: 100%;
      padding: 11px 14px;
      background: #1c1c30;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      color: #eee;
      font-size: 14px;
      font-family: 'Poppins', sans-serif;
      outline: none;
      margin-bottom: 10px;
      transition: border-color 0.2s;
    }
    input[type=password]:focus { border-color: #6c63ff; }
    button {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #6c63ff, #3ecf8e);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      font-family: 'Poppins', sans-serif;
    }
    .error { color: #e74c3c; font-size: 13px; margin-top: 10px; }
    .hint { font-size: 11px; color: #444; margin-top: 16px; }
    .back { display:block; margin-top:16px; font-size:12px; color:#444; text-decoration:none; }
    .back:hover { color: #6c63ff; }
  </style>
</head>
<body>
  <div class="box">
    <div class="lock">🔐</div>
    <h2>Admin Login</h2>
    <p class="sub">Enter password to edit your card</p>

    <form method="POST">
      {% csrf_token %}
      <input type="password" name="password" placeholder="Enter password" autofocus />
      <button type="submit">Login</button>
    </form>

    {% if error %}
    <p class="error">{{ error }}</p>
    {% endif %}

    <p class="hint">Password is set in views.py</p>
    <a href="{% url 'home' %}" class="back">← Back to card</a>
  </div>
</body>
</html>
